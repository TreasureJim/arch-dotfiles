[env]
TERM = "alacritty"

[font]
size = 9.0

[font.bold]
family = "Hack"
style = "Bold"

[font.normal]
family = "Hack"
style = "Regular"

[general]
import = [
    "/home/judasmoses/.config/alacritty/themes/one_dark.toml",
    "/home/judasmoses/.config/alacritty/themes/themes/dark.toml",
]

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[terminal.shell]
program = "/sbin/fish"

[window]
opacity = 1
